name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - foundation

permissions:
  contents: read

jobs:
  test:
    name: Go test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Go fmt check
        run: |
          gofmt -l .
          test -z "$(gofmt -l .)"

      - name: Go test
        run: go test ./...
