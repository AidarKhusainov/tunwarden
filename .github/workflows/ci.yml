name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - foundation

permissions:
  contents: read

jobs:
  test:
    name: Go test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Go fmt check
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Go test
        run: |
          set -o pipefail
          go test ./... 2>&1 | tee /tmp/podlaz-go-test.txt

      - name: Upload Go test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: podlaz-go-test-diagnostics
          path: /tmp/podlaz-go-test.txt
          if-no-files-found: ignore

      - name: Go vet
        run: go vet ./...

      - name: Govulncheck
        run: |
          . packaging/package-toolchain.env
          go install golang.org/x/vuln/cmd/govulncheck@"${GOVULNCHECK_VERSION}"
          "$(go env GOPATH)/bin/govulncheck" ./...

  deb-package:
    name: Debian package
    runs-on: ubuntu-22.04
    env:
      DEV_DEB: dist/podlaz_0.0.0~dev-1_linux_amd64.deb
      ARM64_DEB: dist-arm64/podlaz_0.0.0~dev-1_linux_arm64.deb
      CI_PODLAZ_COMMIT: ci-test
      CI_PODLAZ_BUILT: Jun 19 2026
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Install package tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg file lintian man-db zsh fish gcc-aarch64-linux-gnu libc6-dev-arm64-cross
          . packaging/package-toolchain.env
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@"${NFPM_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build Debian package
        run: |
          set -o pipefail
          PODLAZ_COMMIT="${CI_PODLAZ_COMMIT}" PODLAZ_BUILT="${CI_PODLAZ_BUILT}" bash scripts/build-deb.sh 2>&1 | tee /tmp/podlaz-build-deb.txt
          dist/package-root/usr/bin/podlaz version | tee /tmp/podlaz-built-version.txt
          grep -Fx 'podlaz version 0.0.0~dev' /tmp/podlaz-built-version.txt
          grep -Fx "commit: ${CI_PODLAZ_COMMIT}" /tmp/podlaz-built-version.txt
          grep -Fx "built: ${CI_PODLAZ_BUILT}" /tmp/podlaz-built-version.txt

      - name: Build Debian arm64 package
        run: |
          set -o pipefail
          CC=aarch64-linux-gnu-gcc \
          PODLAZ_DIST_DIR=dist-arm64 \
          PODLAZ_DEB_ARCH=arm64 \
          PODLAZ_COMMIT="${CI_PODLAZ_COMMIT}" \
          PODLAZ_BUILT="${CI_PODLAZ_BUILT}" \
            bash scripts/build-deb.sh 2>&1 | tee /tmp/podlaz-build-deb-arm64.txt
          test -f "${ARM64_DEB}"
          test "$(dpkg-deb --field "${ARM64_DEB}" Package)" = podlaz
          test "$(dpkg-deb --field "${ARM64_DEB}" Version)" = '0.0.0~dev-1'
          test "$(dpkg-deb --field "${ARM64_DEB}" Architecture)" = arm64
          dpkg-deb --contents "${ARM64_DEB}" | tee /tmp/podlaz-arm64-package-contents.txt
          grep -F './usr/bin/podlaz' /tmp/podlaz-arm64-package-contents.txt
          grep -F './usr/bin/podlazd' /tmp/podlaz-arm64-package-contents.txt
          grep -F './usr/share/bash-completion/completions/podlaz' /tmp/podlaz-arm64-package-contents.txt
          grep -F './usr/share/zsh/vendor-completions/_podlaz' /tmp/podlaz-arm64-package-contents.txt
          grep -F './usr/share/fish/vendor_completions.d/podlaz.fish' /tmp/podlaz-arm64-package-contents.txt
          grep -F './usr/share/man/man1/podlaz.1.gz' /tmp/podlaz-arm64-package-contents.txt
          grep -F './usr/share/man/man8/podlazd.8.gz' /tmp/podlaz-arm64-package-contents.txt

      - name: Upload package build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: podlaz-build-deb-diagnostics
          path: |
            /tmp/podlaz-build-deb.txt
            /tmp/podlaz-build-deb-arm64.txt
            /tmp/podlaz-built-version.txt
            /tmp/podlaz-arm64-package-contents.txt
          if-no-files-found: ignore

      - name: Inspect package metadata
        run: dpkg-deb --info "${DEV_DEB}"

      - name: Inspect package contents
        run: |
          dpkg-deb --contents "${DEV_DEB}" | tee /tmp/podlaz-package-contents.txt
          ! grep -E '(^| )\./usr/local(/|$)' /tmp/podlaz-package-contents.txt
          ! grep -E '(^| )\./run(/|$)' /tmp/podlaz-package-contents.txt
          ! grep -E '(^| )\./var/run(/|$)' /tmp/podlaz-package-contents.txt
          ! grep -E '(^| )\./home(/|$)' /tmp/podlaz-package-contents.txt
          ! grep -E '(^| )\./run/podlaz/generated(/|$)' /tmp/podlaz-package-contents.txt
          grep -F './usr/bin/podlaz' /tmp/podlaz-package-contents.txt
          grep -F './usr/bin/podlazd' /tmp/podlaz-package-contents.txt
          grep -F './usr/lib/systemd/system/podlazd.service' /tmp/podlaz-package-contents.txt
          grep -F './usr/lib/sysusers.d/podlaz.conf' /tmp/podlaz-package-contents.txt
          grep -F './usr/share/bash-completion/completions/podlaz' /tmp/podlaz-package-contents.txt
          grep -F './usr/share/zsh/vendor-completions/_podlaz' /tmp/podlaz-package-contents.txt
          grep -F './usr/share/fish/vendor_completions.d/podlaz.fish' /tmp/podlaz-package-contents.txt
          grep -F './usr/share/man/man1/podlaz.1.gz' /tmp/podlaz-package-contents.txt
          grep -F './usr/share/man/man8/podlazd.8.gz' /tmp/podlaz-package-contents.txt
          ! grep -F './usr/share/metainfo/' /tmp/podlaz-package-contents.txt

      - name: Validate packaged daemon access contract
        run: |
          set -eu
          dpkg-deb --fsys-tarfile "${DEV_DEB}" | tar -xOf - ./usr/lib/systemd/system/podlazd.service > /tmp/podlazd.service
          dpkg-deb --fsys-tarfile "${DEV_DEB}" | tar -xOf - ./usr/lib/sysusers.d/podlaz.conf > /tmp/podlaz.sysusers
          grep -F 'u podlaz ' /tmp/podlaz.sysusers
          grep -F 'u podlaz-xray ' /tmp/podlaz.sysusers
          grep -F 'User=podlaz' /tmp/podlazd.service
          grep -F 'Group=podlaz' /tmp/podlazd.service
          grep -F 'UMask=0077' /tmp/podlazd.service
          grep -F 'RuntimeDirectory=podlaz' /tmp/podlazd.service
          grep -F 'RuntimeDirectoryMode=0710' /tmp/podlazd.service
          grep -F 'StateDirectory=podlaz' /tmp/podlazd.service
          grep -F 'StateDirectoryMode=0700' /tmp/podlazd.service
          ! grep -R -E 'systemctl[[:space:]]+(start|enable)[[:space:]]+podlazd|deb-systemd-invoke[[:space:]]+start[[:space:]]+podlazd' packaging/debian

      - name: Validate generated shell completions
        run: |
          go run ./cmd/podlaz completion bash > /tmp/podlaz.bash
          go run ./cmd/podlaz completion zsh > /tmp/_podlaz
          go run ./cmd/podlaz completion fish > /tmp/podlaz.fish
          bash -n /tmp/podlaz.bash
          zsh -n /tmp/_podlaz
          fish --no-config --command 'source /tmp/podlaz.fish'
          grep -F '__complete bash' /tmp/podlaz.bash
          grep -F '#compdef podlaz' /tmp/_podlaz
          grep -F '__complete zsh' /tmp/_podlaz
          grep -F 'complete -c podlaz -f' /tmp/podlaz.fish
          grep -F '__complete fish' /tmp/podlaz.fish
          grep -F -- "-l mode -x -a 'proxy-only tun'" /tmp/podlaz.fish
          grep -F -- "-l protocol -x -a 'vless vmess trojan shadowsocks'" /tmp/podlaz.fish
          fish --no-config --command 'source /tmp/podlaz.fish; complete -C "podlaz plan -" | grep -F -- "--mode"'
          fish --no-config --command 'source /tmp/podlaz.fish; complete -C "podlaz plan --mode " | grep -F "proxy-only"'
          fish --no-config --command 'source /tmp/podlaz.fish; complete -C "podlaz profile add --protocol " | grep -F "vless"'
          fish --no-config --command 'source /tmp/podlaz.fish; complete -C "podlaz logs -" | grep -F -- "--follow"'

      - name: Validate packaged binary linkage
        run: |
          file dist/package-root/usr/bin/podlaz dist/package-root/usr/bin/podlazd
          ldd dist/package-root/usr/bin/podlaz
          ldd dist/package-root/usr/bin/podlazd
          ldd dist/package-root/usr/bin/podlaz | grep -F 'libc.so.6'
          ldd dist/package-root/usr/bin/podlazd | grep -F 'libc.so.6'

      - name: Lint Debian package
        run: |
          set -o pipefail
          lintian --fail-on error "${DEV_DEB}" 2>&1 | tee /tmp/podlaz-lintian.txt

      - name: Upload lintian diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: podlaz-lintian-diagnostics
          path: /tmp/podlaz-lintian.txt
          if-no-files-found: ignore

      - name: Install package locally
        run: |
          sudo apt install -y "./${DEV_DEB}"
          dpkg -L podlaz
          podlaz version | tee /tmp/podlaz-version.txt
          grep -Fx 'podlaz version 0.0.0~dev' /tmp/podlaz-version.txt
          grep -Fx "commit: ${CI_PODLAZ_COMMIT}" /tmp/podlaz-version.txt
          grep -Fx "built: ${CI_PODLAZ_BUILT}" /tmp/podlaz-version.txt
          test -x /usr/bin/podlaz
          test -x /usr/bin/podlazd
          test -f /usr/lib/systemd/system/podlazd.service
          test -f /usr/lib/sysusers.d/podlaz.conf
          test -f /usr/share/bash-completion/completions/podlaz
          test -f /usr/share/zsh/vendor-completions/_podlaz
          test -f /usr/share/fish/vendor_completions.d/podlaz.fish
          test -f /usr/share/man/man1/podlaz.1.gz
          test -f /usr/share/man/man8/podlazd.8.gz
          test ! -e /usr/share/metainfo/io.github.aidarkhusainov.podlaz.metainfo.xml
          man -l /usr/share/man/man1/podlaz.1.gz >/dev/null
          man -l /usr/share/man/man8/podlazd.8.gz >/dev/null
          bash -n /usr/share/bash-completion/completions/podlaz
          zsh -n /usr/share/zsh/vendor-completions/_podlaz
          fish --no-config --command 'source /usr/share/fish/vendor_completions.d/podlaz.fish'
          bash --noprofile --norc -c 'source /usr/share/bash-completion/completions/podlaz; COMP_WORDS=(podlaz ""); COMP_CWORD=1; _podlaz; printf "%s\n" "${COMPREPLY[@]}" | grep -Fx completion'
          zsh -fc 'autoload -Uz compinit; fpath=(/usr/share/zsh/vendor-completions $fpath); compinit -D; autoload -Uz _podlaz; whence _podlaz >/dev/null'
          fish --no-config --command 'source /usr/share/fish/vendor_completions.d/podlaz.fish; complete -C "podlaz " | grep -F completion'
          fish --no-config --command 'source /usr/share/fish/vendor_completions.d/podlaz.fish; complete -C "podlaz plan -" | grep -F -- "--mode"'
          fish --no-config --command 'source /usr/share/fish/vendor_completions.d/podlaz.fish; complete -C "podlaz plan --mode " | grep -F "proxy-only"'
          fish --no-config --command 'source /usr/share/fish/vendor_completions.d/podlaz.fish; complete -C "podlaz profile add --protocol " | grep -F "vless"'
          fish --no-config --command 'source /usr/share/fish/vendor_completions.d/podlaz.fish; complete -C "podlaz logs -" | grep -F -- "--follow"'

      - name: Reinstall package locally
        run: |
          sudo apt install -y --reinstall "./${DEV_DEB}"
          podlaz version | tee /tmp/podlaz-version-reinstall.txt
          grep -Fx 'podlaz version 0.0.0~dev' /tmp/podlaz-version-reinstall.txt
          grep -Fx "commit: ${CI_PODLAZ_COMMIT}" /tmp/podlaz-version-reinstall.txt
          grep -Fx "built: ${CI_PODLAZ_BUILT}" /tmp/podlaz-version-reinstall.txt
          test -f /usr/share/bash-completion/completions/podlaz
          test -f /usr/share/zsh/vendor-completions/_podlaz
          test -f /usr/share/fish/vendor_completions.d/podlaz.fish
          test -f /usr/share/man/man1/podlaz.1.gz
          test -f /usr/share/man/man8/podlazd.8.gz
          test ! -e /usr/share/metainfo/io.github.aidarkhusainov.podlaz.metainfo.xml
          man -l /usr/share/man/man1/podlaz.1.gz >/dev/null
          man -l /usr/share/man/man8/podlazd.8.gz >/dev/null
          bash -n /usr/share/bash-completion/completions/podlaz
          zsh -n /usr/share/zsh/vendor-completions/_podlaz
          fish --no-config --command 'source /usr/share/fish/vendor_completions.d/podlaz.fish'

      - name: Remove package locally
        run: |
          sudo apt remove -y podlaz
          ! dpkg -L podlaz
          test ! -e /usr/bin/podlaz
          test ! -e /usr/bin/podlazd
          test ! -e /usr/lib/systemd/system/podlazd.service
          test ! -e /usr/lib/sysusers.d/podlaz.conf
          test ! -e /usr/share/bash-completion/completions/podlaz
          test ! -e /usr/share/zsh/vendor-completions/_podlaz
          test ! -e /usr/share/fish/vendor_completions.d/podlaz.fish
