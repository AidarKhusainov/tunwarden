name: CI

on:
  pull_request:
  push:
    branches: [master, foundation]

permissions:
  contents: read

jobs:
  test:
    name: Go test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true
      - name: Go fmt check
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then echo "$files"; exit 1; fi
      - name: Go test
        run: |
          set -o pipefail
          go test ./... 2>&1 | tee /tmp/podlaz-go-test.txt
      - name: Upload Go test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: podlaz-go-test-diagnostics
          path: /tmp/podlaz-go-test.txt
          if-no-files-found: ignore
      - name: Go vet
        run: go vet ./...
      - name: Govulncheck
        run: |
          . packaging/package-toolchain.env
          go install golang.org/x/vuln/cmd/govulncheck@"${GOVULNCHECK_VERSION}"
          "$(go env GOPATH)/bin/govulncheck" ./...

  deb-package:
    name: Debian package
    runs-on: ubuntu-22.04
    env:
      DEV_DEB: dist/podlaz_0.0.0~dev-1_linux_amd64.deb
      ARM64_DEB: dist-arm64/podlaz_0.0.0~dev-1_linux_arm64.deb
      CI_PODLAZ_COMMIT: ci-test
      CI_PODLAZ_BUILT: Jun 19 2026
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true
      - name: Install package tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg file lintian man-db zsh fish gcc-aarch64-linux-gnu libc6-dev-arm64-cross
          . packaging/package-toolchain.env
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@"${NFPM_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Build Debian package
        run: |
          set -o pipefail
          PODLAZ_COMMIT="${CI_PODLAZ_COMMIT}" PODLAZ_BUILT="${CI_PODLAZ_BUILT}" bash scripts/build-deb.sh 2>&1 | tee /tmp/podlaz-build-deb.txt
          dist/package-root/usr/bin/podlaz version | tee /tmp/podlaz-built-version.txt
          grep -Fx 'podlaz version 0.0.0~dev' /tmp/podlaz-built-version.txt
          grep -Fx "commit: ${CI_PODLAZ_COMMIT}" /tmp/podlaz-built-version.txt
          grep -Fx "built: ${CI_PODLAZ_BUILT}" /tmp/podlaz-built-version.txt
      - name: Build Debian arm64 package
        run: |
          set -o pipefail
          CC=aarch64-linux-gnu-gcc PODLAZ_DIST_DIR=dist-arm64 PODLAZ_DEB_ARCH=arm64 PODLAZ_COMMIT="${CI_PODLAZ_COMMIT}" PODLAZ_BUILT="${CI_PODLAZ_BUILT}" bash scripts/build-deb.sh 2>&1 | tee /tmp/podlaz-build-deb-arm64.txt
          test -f "${ARM64_DEB}"
          test "$(dpkg-deb --field "${ARM64_DEB}" Package)" = podlaz
          test "$(dpkg-deb --field "${ARM64_DEB}" Version)" = '0.0.0~dev-1'
          test "$(dpkg-deb --field "${ARM64_DEB}" Architecture)" = arm64
          dpkg-deb --contents "${ARM64_DEB}" | tee /tmp/podlaz-arm64-package-contents.txt
      - name: Upload package build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: podlaz-build-deb-diagnostics
          path: |
            /tmp/podlaz-build-deb.txt
            /tmp/podlaz-build-deb-arm64.txt
            /tmp/podlaz-built-version.txt
            /tmp/podlaz-arm64-package-contents.txt
          if-no-files-found: ignore
      - name: Inspect package metadata
        run: dpkg-deb --info "${DEV_DEB}"
      - name: Inspect package contents
        run: |
          dpkg-deb --contents "${DEV_DEB}" | tee /tmp/podlaz-package-contents.txt
          for bad in './usr/local' './run' './var/run' './home' './run/podlaz/generated' './usr/share/metainfo/'; do ! grep -F "$bad" /tmp/podlaz-package-contents.txt; done
          for path in './usr/bin/podlaz' './usr/bin/podlazd' './usr/lib/systemd/system/podlazd.service' './usr/lib/sysusers.d/podlaz.conf' './usr/share/bash-completion/completions/podlaz' './usr/share/zsh/vendor-completions/_podlaz' './usr/share/fish/vendor_completions.d/podlaz.fish' './usr/share/man/man1/podlaz.1.gz' './usr/share/man/man8/podlazd.8.gz'; do grep -F "$path" /tmp/podlaz-package-contents.txt; grep -F "$path" /tmp/podlaz-arm64-package-contents.txt; done
      - name: Validate packaged daemon access contract
        run: |
          set -eu
          dpkg-deb --fsys-tarfile "${DEV_DEB}" | tar -xOf - ./usr/lib/systemd/system/podlazd.service > /tmp/podlazd.service
          dpkg-deb --fsys-tarfile "${DEV_DEB}" | tar -xOf - ./usr/lib/sysusers.d/podlaz.conf > /tmp/podlaz.sysusers
          for line in 'u podlaz ' 'u podlaz-xray '; do grep -F "$line" /tmp/podlaz.sysusers; done
          for line in 'User=root' 'Group=podlaz' 'UMask=0077' 'RuntimeDirectory=podlaz' 'RuntimeDirectoryMode=0711' 'StateDirectory=podlaz' 'StateDirectoryMode=0700' 'NoNewPrivileges=yes' 'CapabilityBoundingSet=CAP_CHOWN CAP_SETUID CAP_SETGID CAP_KILL CAP_NET_ADMIN' 'AmbientCapabilities=CAP_SETUID CAP_KILL' 'RestrictSUIDSGID=yes' 'MemoryDenyWriteExecute=yes'; do grep -Fx "$line" /tmp/podlazd.service; done
          ! grep -E '^AmbientCapabilities=.*CAP_(NET_ADMIN|SETGID|SYS_ADMIN)' /tmp/podlazd.service
          ! grep -R -E 'systemctl[[:space:]]+(start|enable)[[:space:]]+podlazd|deb-systemd-invoke[[:space:]]+start[[:space:]]+podlazd' packaging/debian
      - name: Validate generated shell completions
        run: |
          go run ./cmd/podlaz completion bash > /tmp/podlaz.bash
          go run ./cmd/podlaz completion zsh > /tmp/_podlaz
          go run ./cmd/podlaz completion fish > /tmp/podlaz.fish
          bash -n /tmp/podlaz.bash
          zsh -n /tmp/_podlaz
          fish --no-config --command 'source /tmp/podlaz.fish'
          grep -F '__complete bash' /tmp/podlaz.bash
          grep -F '#compdef podlaz' /tmp/_podlaz
          grep -F 'complete -c podlaz -f' /tmp/podlaz.fish
          fish --no-config --command 'source /tmp/podlaz.fish; complete -C "podlaz plan -" | grep -F -- "--mode"'
      - name: Validate packaged binary linkage
        run: |
          file dist/package-root/usr/bin/podlaz dist/package-root/usr/bin/podlazd
          ldd dist/package-root/usr/bin/podlaz | grep -F 'libc.so.6'
          ldd dist/package-root/usr/bin/podlazd | grep -F 'libc.so.6'
      - name: Lint Debian package
        run: |
          set -o pipefail
          lintian --fail-on error "${DEV_DEB}" 2>&1 | tee /tmp/podlaz-lintian.txt
      - name: Upload lintian diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: podlaz-lintian-diagnostics
          path: /tmp/podlaz-lintian.txt
          if-no-files-found: ignore
      - name: Install package locally
        run: |
          sudo apt install -y "./${DEV_DEB}"
          dpkg -L podlaz
          podlaz version | tee /tmp/podlaz-version.txt
          grep -Fx 'podlaz version 0.0.0~dev' /tmp/podlaz-version.txt
          grep -Fx "commit: ${CI_PODLAZ_COMMIT}" /tmp/podlaz-version.txt
          grep -Fx "built: ${CI_PODLAZ_BUILT}" /tmp/podlaz-version.txt
          for path in /usr/bin/podlaz /usr/bin/podlazd /usr/lib/systemd/system/podlazd.service /usr/lib/sysusers.d/podlaz.conf /usr/share/bash-completion/completions/podlaz /usr/share/zsh/vendor-completions/_podlaz /usr/share/fish/vendor_completions.d/podlaz.fish /usr/share/man/man1/podlaz.1.gz /usr/share/man/man8/podlazd.8.gz; do test -e "$path"; done
          test ! -e /usr/share/metainfo/io.github.aidarkhusainov.podlaz.metainfo.xml
          man -l /usr/share/man/man1/podlaz.1.gz >/dev/null
          man -l /usr/share/man/man8/podlazd.8.gz >/dev/null
          bash -n /usr/share/bash-completion/completions/podlaz
          zsh -n /usr/share/zsh/vendor-completions/_podlaz
          fish --no-config --command 'source /usr/share/fish/vendor_completions.d/podlaz.fish'
      - name: Reinstall package locally
        run: |
          sudo apt install -y --reinstall "./${DEV_DEB}"
          podlaz version | tee /tmp/podlaz-version-reinstall.txt
          grep -Fx 'podlaz version 0.0.0~dev' /tmp/podlaz-version-reinstall.txt
          grep -Fx "commit: ${CI_PODLAZ_COMMIT}" /tmp/podlaz-version-reinstall.txt
          grep -Fx "built: ${CI_PODLAZ_BUILT}" /tmp/podlaz-version-reinstall.txt
      - name: Remove package locally
        run: |
          sudo apt remove -y podlaz
          ! dpkg -L podlaz
          test ! -e /usr/bin/podlaz
