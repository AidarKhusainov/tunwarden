name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - foundation

permissions:
  contents: read

jobs:
  test:
    name: Go test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Go fmt check
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Go test
        run: go test ./...

      - name: Go vet
        run: go vet ./...

      - name: Govulncheck
        run: |
          . packaging/package-toolchain.env
          go install golang.org/x/vuln/cmd/govulncheck@"${GOVULNCHECK_VERSION}"
          "$(go env GOPATH)/bin/govulncheck" ./...

  deb-package:
    name: Debian package
    runs-on: ubuntu-22.04
    env:
      DEV_DEB: dist/tunwarden_0.0.0~dev-1_amd64.deb
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Install package tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends appstream dpkg file lintian man-db zsh fish
          . packaging/package-toolchain.env
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@"${NFPM_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Validate AppStream metadata
        run: appstreamcli validate --no-net packaging/linux/io.github.aidarkhusainov.tunwarden.metainfo.xml

      - name: Build Debian package
        run: bash scripts/build-deb.sh

      - name: Inspect package metadata
        run: dpkg-deb --info "${DEV_DEB}"

      - name: Inspect package contents
        run: |
          dpkg-deb --contents "${DEV_DEB}" | tee /tmp/tunwarden-package-contents.txt
          ! grep -E '(^| )\./usr/local(/|$)' /tmp/tunwarden-package-contents.txt
          ! grep -E '(^| )\./run(/|$)' /tmp/tunwarden-package-contents.txt
          ! grep -E '(^| )\./var/run(/|$)' /tmp/tunwarden-package-contents.txt
          ! grep -E '(^| )\./home(/|$)' /tmp/tunwarden-package-contents.txt
          ! grep -E '(^| )\./run/tunwarden/generated(/|$)' /tmp/tunwarden-package-contents.txt
          grep -F './usr/bin/tunwarden' /tmp/tunwarden-package-contents.txt
          grep -F './usr/bin/tunwardend' /tmp/tunwarden-package-contents.txt
          grep -F './usr/lib/systemd/system/tunwardend.service' /tmp/tunwarden-package-contents.txt
          grep -F './usr/lib/sysusers.d/tunwarden.conf' /tmp/tunwarden-package-contents.txt
          grep -F './usr/share/bash-completion/completions/tunwarden' /tmp/tunwarden-package-contents.txt
          grep -F './usr/share/zsh/vendor-completions/_tunwarden' /tmp/tunwarden-package-contents.txt
          grep -F './usr/share/fish/vendor_completions.d/tunwarden.fish' /tmp/tunwarden-package-contents.txt
          grep -F './usr/share/metainfo/io.github.aidarkhusainov.tunwarden.metainfo.xml' /tmp/tunwarden-package-contents.txt
          grep -F './usr/share/man/man1/tunwarden.1.gz' /tmp/tunwarden-package-contents.txt
          grep -F './usr/share/man/man8/tunwardend.8.gz' /tmp/tunwarden-package-contents.txt

      - name: Validate packaged daemon access contract
        run: |
          set -eu
          dpkg-deb --fsys-tarfile "${DEV_DEB}" | tar -xOf - ./usr/lib/systemd/system/tunwardend.service > /tmp/tunwardend.service
          dpkg-deb --fsys-tarfile "${DEV_DEB}" | tar -xOf - ./usr/lib/sysusers.d/tunwarden.conf > /tmp/tunwarden.sysusers
          grep -F 'u tunwarden ' /tmp/tunwarden.sysusers
          grep -F 'u tunwarden-xray ' /tmp/tunwarden.sysusers
          grep -F 'User=tunwarden' /tmp/tunwardend.service
          grep -F 'Group=tunwarden' /tmp/tunwardend.service
          grep -F 'UMask=0077' /tmp/tunwardend.service
          grep -F 'RuntimeDirectory=tunwarden' /tmp/tunwardend.service
          grep -F 'RuntimeDirectoryMode=0710' /tmp/tunwardend.service
          grep -F 'StateDirectory=tunwarden' /tmp/tunwardend.service
          grep -F 'StateDirectoryMode=0700' /tmp/tunwardend.service
          ! grep -R -E 'systemctl[[:space:]]+(start|enable)[[:space:]]+tunwardend|deb-systemd-invoke[[:space:]]+start[[:space:]]+tunwardend' packaging/debian

      - name: Validate generated shell completions
        run: |
          go run ./cmd/tunwarden completion bash > /tmp/tunwarden.bash
          go run ./cmd/tunwarden completion zsh > /tmp/_tunwarden
          go run ./cmd/tunwarden completion fish > /tmp/tunwarden.fish
          bash -n /tmp/tunwarden.bash
          zsh -n /tmp/_tunwarden
          fish --no-config --command 'source /tmp/tunwarden.fish'
          grep -F '__complete bash' /tmp/tunwarden.bash
          grep -F '#compdef tunwarden' /tmp/_tunwarden
          grep -F '__complete zsh' /tmp/_tunwarden
          grep -F 'complete -c tunwarden -f' /tmp/tunwarden.fish
          grep -F '__complete fish' /tmp/tunwarden.fish
          grep -F -- "-l mode -x -a 'proxy-only tun'" /tmp/tunwarden.fish
          grep -F -- "-l protocol -x -a 'vless vmess trojan shadowsocks'" /tmp/tunwarden.fish
          fish --no-config --command 'source /tmp/tunwarden.fish; complete -C "tunwarden plan -" | grep -F -- "--mode"'
          fish --no-config --command 'source /tmp/tunwarden.fish; complete -C "tunwarden plan --mode " | grep -F "proxy-only"'
          fish --no-config --command 'source /tmp/tunwarden.fish; complete -C "tunwarden profile add --protocol " | grep -F "vless"'
          fish --no-config --command 'source /tmp/tunwarden.fish; complete -C "tunwarden logs -" | grep -F -- "--follow"'

      - name: Validate packaged binary linkage
        run: |
          file dist/package-root/usr/bin/tunwarden dist/package-root/usr/bin/tunwardend
          ldd dist/package-root/usr/bin/tunwarden
          ldd dist/package-root/usr/bin/tunwardend
          ldd dist/package-root/usr/bin/tunwarden | grep -F 'libc.so.6'
          ldd dist/package-root/usr/bin/tunwardend | grep -F 'libc.so.6'

      - name: Lint Debian package
        run: |
          set -o pipefail
          lintian --fail-on error "${DEV_DEB}" 2>&1 | tee /tmp/tunwarden-lintian.txt

      - name: Upload lintian diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tunwarden-lintian-diagnostics
          path: /tmp/tunwarden-lintian.txt
          if-no-files-found: ignore

      - name: Install package locally
        run: |
          sudo apt install -y "./${DEV_DEB}"
          dpkg -L tunwarden
          tunwarden version
          test "$(tunwarden version)" = "tunwarden 0.0.0~dev"
          test -x /usr/bin/tunwarden
          test -x /usr/bin/tunwardend
          test -f /usr/lib/systemd/system/tunwardend.service
          test -f /usr/lib/sysusers.d/tunwarden.conf
          test -f /usr/share/bash-completion/completions/tunwarden
          test -f /usr/share/zsh/vendor-completions/_tunwarden
          test -f /usr/share/fish/vendor_completions.d/tunwarden.fish
          test -f /usr/share/metainfo/io.github.aidarkhusainov.tunwarden.metainfo.xml
          test -f /usr/share/man/man1/tunwarden.1.gz
          test -f /usr/share/man/man8/tunwardend.8.gz
          appstreamcli validate --no-net /usr/share/metainfo/io.github.aidarkhusainov.tunwarden.metainfo.xml
          man -l /usr/share/man/man1/tunwarden.1.gz >/dev/null
          man -l /usr/share/man/man8/tunwardend.8.gz >/dev/null
          bash -n /usr/share/bash-completion/completions/tunwarden
          zsh -n /usr/share/zsh/vendor-completions/_tunwarden
          fish --no-config --command 'source /usr/share/fish/vendor_completions.d/tunwarden.fish'
          bash --noprofile --norc -c 'source /usr/share/bash-completion/completions/tunwarden; COMP_WORDS=(tunwarden ""); COMP_CWORD=1; _tunwarden; printf "%s\n" "${COMPREPLY[@]}" | grep -Fx completion'
          zsh -fc 'autoload -Uz compinit; fpath=(/usr/share/zsh/vendor-completions $fpath); compinit -D; autoload -Uz _tunwarden; whence _tunwarden >/dev/null'
          fish --no-config --command 'source /usr/share/fish/vendor_completions.d/tunwarden.fish; complete -C "tunwarden " | grep -F completion'
          fish --no-config --command 'source /usr/share/fish/vendor_completions.d/tunwarden.fish; complete -C "tunwarden plan -" | grep -F -- "--mode"'
          fish --no-config --command 'source /usr/share/fish/vendor_completions.d/tunwarden.fish; complete -C "tunwarden plan --mode " | grep -F "proxy-only"'
          fish --no-config --command 'source /usr/share/fish/vendor_completions.d/tunwarden.fish; complete -C "tunwarden profile add --protocol " | grep -F "vless"'
          fish --no-config --command 'source /usr/share/fish/vendor_completions.d/tunwarden.fish; complete -C "tunwarden logs -" | grep -F -- "--follow"'

      - name: Reinstall package locally
        run: |
          sudo apt install -y --reinstall "./${DEV_DEB}"
          test "$(tunwarden version)" = "tunwarden 0.0.0~dev"
          test -f /usr/share/bash-completion/completions/tunwarden
          test -f /usr/share/zsh/vendor-completions/_tunwarden
          test -f /usr/share/fish/vendor_completions.d/tunwarden.fish
          test -f /usr/share/metainfo/io.github.aidarkhusainov.tunwarden.metainfo.xml
          appstreamcli validate --no-net /usr/share/metainfo/io.github.aidarkhusainov.tunwarden.metainfo.xml
          man -l /usr/share/man/man1/tunwarden.1.gz >/dev/null
          man -l /usr/share/man/man8/tunwardend.8.gz >/dev/null
          bash -n /usr/share/bash-completion/completions/tunwarden
          zsh -n /usr/share/zsh/vendor-completions/_tunwarden
          fish --no-config --command 'source /usr/share/fish/vendor_completions.d/tunwarden.fish'

      - name: Remove package locally
        run: |
          sudo apt remove -y tunwarden
          ! dpkg -L tunwarden
          test ! -e /usr/bin/tunwarden
          test ! -e /usr/bin/tunwardend
          test ! -e /usr/lib/systemd/system/tunwardend.service
          test ! -e /usr/lib/sysusers.d/tunwarden.conf
          test ! -e /usr/share/bash-completion/completions/tunwarden
          test ! -e /usr/share/zsh/vendor-completions/_tunwarden
          test ! -e /usr/share/fish/vendor_completions.d/tunwarden.fish
          test ! -e /usr/share/metainfo/io.github.aidarkhusainov.tunwarden.metainfo.xml
