name: Provision E2E runner

on:
  workflow_dispatch:
    inputs:
      host:
        description: SSH host/IP. Empty uses E2E_BOOTSTRAP_SSH_HOST from vpn-e2e variables or secrets.
        required: false
        type: string
        default: ''
      ssh_user:
        description: SSH user. Empty uses E2E_BOOTSTRAP_SSH_USER, then root.
        required: false
        type: string
        default: ''
      ssh_port:
        description: SSH port. Empty uses E2E_BOOTSTRAP_SSH_PORT, then 22.
        required: false
        type: string
        default: ''
      allow_insecure_ssh_keyscan:
        description: Allow first-use ssh-keyscan instead of pinned E2E_BOOTSTRAP_SSH_KNOWN_HOSTS.
        required: true
        type: boolean
        default: false
      platform_label:
        description: OS label to provision and attach to the runner
        required: true
        type: choice
        default: ubuntu-24.04
        options:
          - ubuntu-24.04
          - ubuntu-22.04
          - debian-12
          - debian-13
      arch_label:
        description: CPU architecture label to provision and attach to the runner
        required: true
        type: choice
        default: x64
        options:
          - x64
          - arm64
      runner_name:
        description: Optional GitHub runner name. Empty uses E2E_RUNNER_NAME or podlaz-<hostname>-vpn-e2e.
        required: false
        type: string
        default: ''
      runner_user:
        description: Local Linux user that owns the GitHub Actions runner service. Empty uses E2E_RUNNER_USER, then gha-runner.
        required: false
        type: string
        default: ''
      runner_home:
        description: Runner installation directory. Empty uses E2E_RUNNER_HOME, then /opt/actions-runner/actions-runner.
        required: false
        type: string
        default: ''
      runner_labels:
        description: Comma-separated labels. Empty derives self-hosted,linux,<arch>,vpn-e2e,<platform>.
        required: false
        type: string
        default: ''
      reset_runner:
        description: Stop and replace an existing runner installation in runner_home
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: podlaz-e2e-runner-provision
  cancel-in-progress: false

jobs:
  provision:
    name: Bootstrap E2E self-hosted runner
    runs-on: ubuntu-latest
    environment: vpn-e2e
    timeout-minutes: 30
    env:
      SSH_HOST: ${{ inputs.host || vars.E2E_BOOTSTRAP_SSH_HOST || secrets.E2E_BOOTSTRAP_SSH_HOST }}
      SSH_PORT: ${{ inputs.ssh_port || vars.E2E_BOOTSTRAP_SSH_PORT || secrets.E2E_BOOTSTRAP_SSH_PORT || '22' }}
      SSH_USER: ${{ inputs.ssh_user || vars.E2E_BOOTSTRAP_SSH_USER || secrets.E2E_BOOTSTRAP_SSH_USER || 'root' }}
      ALLOW_INSECURE_SSH_KEYSCAN: ${{ inputs.allow_insecure_ssh_keyscan }}
      RUNNER_PLATFORM_LABEL: ${{ inputs.platform_label || vars.E2E_RUNNER_PLATFORM_LABEL || secrets.E2E_RUNNER_PLATFORM_LABEL || 'ubuntu-24.04' }}
      RUNNER_ARCH_LABEL: ${{ inputs.arch_label || vars.E2E_RUNNER_ARCH_LABEL || secrets.E2E_RUNNER_ARCH_LABEL || 'x64' }}
      RUNNER_NAME: ${{ inputs.runner_name || vars.E2E_RUNNER_NAME || secrets.E2E_RUNNER_NAME }}
      RUNNER_USER: ${{ inputs.runner_user || vars.E2E_RUNNER_USER || secrets.E2E_RUNNER_USER || 'gha-runner' }}
      RUNNER_HOME: ${{ inputs.runner_home || vars.E2E_RUNNER_HOME || secrets.E2E_RUNNER_HOME || '/opt/actions-runner/actions-runner' }}
      RUNNER_LABELS: ${{ inputs.runner_labels || vars.E2E_RUNNER_LABELS || secrets.E2E_RUNNER_LABELS }}
      RESET_RUNNER: ${{ inputs.reset_runner }}
      E2E_BOOTSTRAP_SSH_PRIVATE_KEY: ${{ secrets.E2E_BOOTSTRAP_SSH_PRIVATE_KEY }}
      E2E_BOOTSTRAP_SSH_KNOWN_HOSTS: ${{ secrets.E2E_BOOTSTRAP_SSH_KNOWN_HOSTS }}
      E2E_RUNNER_ADMIN_TOKEN: ${{ secrets.E2E_RUNNER_ADMIN_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate bootstrap configuration
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${RUNNER_LABELS}" ]]; then
            RUNNER_LABELS="self-hosted,linux,${RUNNER_ARCH_LABEL},vpn-e2e,${RUNNER_PLATFORM_LABEL}"
          fi

          [[ -n "${SSH_HOST}" ]] || { echo "::error::SSH host is required. Set input host or E2E_BOOTSTRAP_SSH_HOST."; exit 2; }
          [[ -n "${SSH_USER}" ]] || { echo "::error::SSH user is required. Set input ssh_user or E2E_BOOTSTRAP_SSH_USER."; exit 2; }
          [[ "${SSH_PORT}" =~ ^[0-9]+$ ]] || { echo "::error::SSH port must be numeric"; exit 2; }
          [[ -n "${E2E_BOOTSTRAP_SSH_PRIVATE_KEY}" ]] || { echo "::error::E2E_BOOTSTRAP_SSH_PRIVATE_KEY is required"; exit 2; }
          [[ -n "${E2E_RUNNER_ADMIN_TOKEN}" ]] || { echo "::error::E2E_RUNNER_ADMIN_TOKEN is required"; exit 2; }

          case "${ALLOW_INSECURE_SSH_KEYSCAN}" in
            true|false) ;;
            *) echo "::error::allow_insecure_ssh_keyscan must resolve to true or false"; exit 2 ;;
          esac

          case "${RUNNER_PLATFORM_LABEL}" in
            ubuntu-24.04|ubuntu-22.04|debian-12|debian-13) ;;
            *) echo "::error::Unsupported RUNNER_PLATFORM_LABEL=${RUNNER_PLATFORM_LABEL}"; exit 2 ;;
          esac

          case "${RUNNER_ARCH_LABEL}" in
            x64|arm64) ;;
            *) echo "::error::Unsupported RUNNER_ARCH_LABEL=${RUNNER_ARCH_LABEL}"; exit 2 ;;
          esac

          case "${SSH_HOST}${SSH_PORT}${SSH_USER}${RUNNER_NAME}${RUNNER_USER}${RUNNER_HOME}${RUNNER_LABELS}" in
            *$'\n'*|*$'\r'*) echo "::error::Bootstrap inputs must not contain newlines"; exit 2 ;;
          esac

          {
            echo "SSH_HOST=${SSH_HOST}"
            echo "SSH_PORT=${SSH_PORT}"
            echo "SSH_USER=${SSH_USER}"
            echo "RUNNER_PLATFORM_LABEL=${RUNNER_PLATFORM_LABEL}"
            echo "RUNNER_ARCH_LABEL=${RUNNER_ARCH_LABEL}"
            echo "RUNNER_NAME=${RUNNER_NAME}"
            echo "RUNNER_USER=${RUNNER_USER}"
            echo "RUNNER_HOME=${RUNNER_HOME}"
            echo "RUNNER_LABELS=${RUNNER_LABELS}"
          } >> "${GITHUB_ENV}"

      - name: Prepare SSH identity
        shell: bash
        run: |
          set -euo pipefail
          install -m 0700 -d ~/.ssh
          printf '%s\n' "${E2E_BOOTSTRAP_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 0600 ~/.ssh/id_ed25519

          ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub
          echo "Bootstrap SSH public key fingerprint:"
          ssh-keygen -l -f ~/.ssh/id_ed25519.pub

          if [[ -n "${E2E_BOOTSTRAP_SSH_KNOWN_HOSTS}" ]]; then
            printf '%s\n' "${E2E_BOOTSTRAP_SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          elif [[ "${ALLOW_INSECURE_SSH_KEYSCAN}" == "true" ]]; then
            echo "::warning::Using ssh-keyscan without pinned known_hosts. Only use this for first-time bootstrap on a trusted network."
            ssh-keyscan -p "${SSH_PORT}" -H "${SSH_HOST}" >> ~/.ssh/known_hosts
          else
            echo "::error::E2E_BOOTSTRAP_SSH_KNOWN_HOSTS is required. Set allow_insecure_ssh_keyscan=true only for explicit first-use bootstrap."
            exit 2
          fi
          chmod 0644 ~/.ssh/known_hosts

      - name: SSH and privilege preflight
        shell: bash
        run: |
          set -euo pipefail
          ssh -p "${SSH_PORT}" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o IdentitiesOnly=yes \
            -o PasswordAuthentication=no \
            -o PreferredAuthentications=publickey \
            -o StrictHostKeyChecking=yes \
            "${SSH_USER}@${SSH_HOST}" \
            'printf "connected as %s on %s\n" "$(id -un)" "$(hostname)"; if [ "$(id -u)" -eq 0 ]; then exit 0; fi; sudo -n true'

      - name: Resolve latest actions runner version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          headers=(-H "Accept: application/vnd.github+json")
          if [[ -n "${GH_TOKEN}" ]]; then
            headers+=(-H "Authorization: Bearer ${GH_TOKEN}")
          fi
          release_json="$(curl -fsSL "${headers[@]}" https://api.github.com/repos/actions/runner/releases/latest)"
          runner_version="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["tag_name"].removeprefix("v"))' <<<"${release_json}")"
          [[ -n "${runner_version}" ]] || { echo "::error::Could not resolve actions runner version"; exit 1; }
          echo "RUNNER_VERSION=${runner_version}" >> "${GITHUB_ENV}"

      - name: Create runner registration token
        shell: bash
        run: |
          set -euo pipefail
          token_json="$(curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${E2E_RUNNER_ADMIN_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runners/registration-token")"
          runner_token="$(python3 -c 'import json,sys; print(json.load(sys.stdin).get("token", ""))' <<<"${token_json}")"
          [[ -n "${runner_token}" ]] || { echo "::error::Could not create runner registration token"; exit 1; }
          echo "::add-mask::${runner_token}"
          echo "RUNNER_REGISTRATION_TOKEN=${runner_token}" >> "${GITHUB_ENV}"

      - name: Upload bootstrap script
        shell: bash
        run: |
          set -euo pipefail
          remote_bootstrap_path="/tmp/podlaz-bootstrap-e2e-runner-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.sh"
          echo "REMOTE_BOOTSTRAP_PATH=${remote_bootstrap_path}" >> "${GITHUB_ENV}"
          scp -P "${SSH_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o PasswordAuthentication=no \
            -o PreferredAuthentications=publickey \
            -o StrictHostKeyChecking=yes \
            scripts/ops/bootstrap-e2e-runner.sh \
            "${SSH_USER}@${SSH_HOST}:${remote_bootstrap_path}"

      - name: Run remote bootstrap
        shell: bash
        run: |
          set -euo pipefail

          shell_quote() {
            printf '%q' "$1"
          }

          remote_env=(
            "GITHUB_SERVER_URL=$(shell_quote "${GITHUB_SERVER_URL}")"
            "GITHUB_REPOSITORY=$(shell_quote "${GITHUB_REPOSITORY}")"
            "RUNNER_REGISTRATION_TOKEN=$(shell_quote "${RUNNER_REGISTRATION_TOKEN}")"
            "RUNNER_VERSION=$(shell_quote "${RUNNER_VERSION}")"
            "RUNNER_NAME=$(shell_quote "${RUNNER_NAME}")"
            "RUNNER_USER=$(shell_quote "${RUNNER_USER}")"
            "RUNNER_HOME=$(shell_quote "${RUNNER_HOME}")"
            "RUNNER_LABELS=$(shell_quote "${RUNNER_LABELS}")"
            "RUNNER_PLATFORM_LABEL=$(shell_quote "${RUNNER_PLATFORM_LABEL}")"
            "RUNNER_ARCH_LABEL=$(shell_quote "${RUNNER_ARCH_LABEL}")"
            "RESET_RUNNER=$(shell_quote "${RESET_RUNNER}")"
          )

          remote_bootstrap_path="$(shell_quote "${REMOTE_BOOTSTRAP_PATH}")"
          remote_command="env ${remote_env[*]} bash ${remote_bootstrap_path}"
          if [[ "${SSH_USER}" != "root" ]]; then
            remote_command="sudo ${remote_command}"
          fi

          ssh -p "${SSH_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o PasswordAuthentication=no \
            -o PreferredAuthentications=publickey \
            -o StrictHostKeyChecking=yes \
            "${SSH_USER}@${SSH_HOST}" \
            "${remote_command}"
