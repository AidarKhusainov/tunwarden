name: Release Smoke

on:
  push:
    branches:
      - release-smoke-branch
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Build release artifacts without publishing
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      VERSION: 0.1.999
      DEB_FILE_VERSION: 0.1.999-1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Go fmt check
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Go test
        run: go test ./...

      - name: Go vet
        run: go vet ./...

      - name: Govulncheck
        run: |
          . packaging/package-toolchain.env
          go install golang.org/x/vuln/cmd/govulncheck@"${GOVULNCHECK_VERSION}"
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Install package tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg file lintian man-db
          . packaging/package-toolchain.env
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@"${NFPM_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build Linux binary tarball
        run: |
          set -euo pipefail
          mkdir -p dist/release/bin
          version_package="github.com/AidarKhusainov/tunwarden/internal/app/cli.version"
          ldflags="-s -w -X ${version_package}=${VERSION}"
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "$ldflags" -o dist/release/bin/tunwarden ./cmd/tunwarden
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "$ldflags" -o dist/release/bin/tunwardend ./cmd/tunwardend
          cd dist/release/bin
          tar -czf "../tunwarden_${VERSION}_linux_amd64.tar.gz" tunwarden tunwardend
          cd ../../..
          ./dist/release/bin/tunwarden version
          test "$(./dist/release/bin/tunwarden version)" = "tunwarden ${VERSION}"

      - name: Build Debian package
        env:
          TUNWARDEN_VERSION: ${{ env.VERSION }}
          TUNWARDEN_DEB_VERSION: ${{ env.DEB_FILE_VERSION }}
          TUNWARDEN_DEB_ARCH: amd64
        run: |
          set -euo pipefail
          bash scripts/build-deb.sh
          echo "dist contents:"
          find dist -maxdepth 2 -type f -print | sort

      - name: Resolve built Debian package
        id: deb
        run: |
          set -euo pipefail
          found="$(find dist -maxdepth 1 -type f -name 'tunwarden_*_amd64.deb' -print | sort)"
          count="$(printf '%s\n' "$found" | sed '/^$/d' | wc -l)"
          echo "found Debian packages:"
          printf '%s\n' "$found"
          if [ "$count" -ne 1 ]; then
            echo "expected exactly one Debian package, found $count" >&2
            exit 1
          fi
          deb_path="$found"
          deb_name="$(basename "$deb_path")"
          echo "deb_path=$deb_path" >> "$GITHUB_OUTPUT"
          echo "deb_name=$deb_name" >> "$GITHUB_OUTPUT"
          echo "package filename: $deb_name"
          echo "package version: $(dpkg-deb --field "$deb_path" Version)"
          test "$(dpkg-deb --field "$deb_path" Version)" = "${DEB_FILE_VERSION}"

      - name: Inspect package metadata
        run: dpkg-deb --info "${{ steps.deb.outputs.deb_path }}"

      - name: Inspect package contents
        run: |
          dpkg-deb --contents "${{ steps.deb.outputs.deb_path }}" | tee /tmp/tunwarden-package-contents.txt
          ! grep -E '(^| )\./usr/local(/|$)' /tmp/tunwarden-package-contents.txt
          ! grep -E '(^| )\./run(/|$)' /tmp/tunwarden-package-contents.txt
          ! grep -E '(^| )\./var/run(/|$)' /tmp/tunwarden-package-contents.txt
          ! grep -E '(^| )\./home(/|$)' /tmp/tunwarden-package-contents.txt
          grep -F './usr/bin/tunwarden' /tmp/tunwarden-package-contents.txt
          grep -F './usr/bin/tunwardend' /tmp/tunwarden-package-contents.txt
          grep -F './usr/share/man/man1/tunwarden.1.gz' /tmp/tunwarden-package-contents.txt
          grep -F './usr/share/man/man8/tunwardend.8.gz' /tmp/tunwarden-package-contents.txt

      - name: Lint Debian package
        run: |
          set -o pipefail
          lintian --fail-on error "${{ steps.deb.outputs.deb_path }}" 2>&1 | tee /tmp/tunwarden-lintian.txt

      - name: Install package locally
        run: |
          set -euo pipefail
          ip route show > /tmp/tunwarden-routes-before.txt
          sudo apt install -y "./${{ steps.deb.outputs.deb_path }}"
          ip route show > /tmp/tunwarden-routes-after.txt
          diff -u /tmp/tunwarden-routes-before.txt /tmp/tunwarden-routes-after.txt
          dpkg -L tunwarden
          test "$(tunwarden version)" = "tunwarden ${VERSION}"
          test -x /usr/bin/tunwarden
          test -x /usr/bin/tunwardend
          test -f /usr/share/man/man1/tunwarden.1.gz
          test -f /usr/share/man/man8/tunwardend.8.gz
          man -l /usr/share/man/man1/tunwarden.1.gz >/dev/null
          man -l /usr/share/man/man8/tunwardend.8.gz >/dev/null
          ! pgrep -x tunwardend

      - name: Create checksums
        run: |
          set -euo pipefail
          mkdir -p dist/release
          cp "${{ steps.deb.outputs.deb_path }}" dist/release/
          cd dist/release
          sha256sum "tunwarden_${VERSION}_linux_amd64.tar.gz" "${{ steps.deb.outputs.deb_name }}" > "tunwarden_${VERSION}_checksums.txt"
          cat "tunwarden_${VERSION}_checksums.txt"

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tunwarden-release-smoke-${{ env.VERSION }}
          path: |
            dist/release/*.tar.gz
            dist/release/*.deb
            dist/release/*_checksums.txt
            /tmp/tunwarden-lintian.txt
            /tmp/tunwarden-package-contents.txt
          if-no-files-found: ignore
