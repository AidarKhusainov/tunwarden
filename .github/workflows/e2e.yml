name: E2E

on:
  workflow_dispatch:
    inputs:
      suite:
        description: E2E suite to run
        required: true
        type: choice
        default: cli-contract
        options:
          - cli-contract
          - package-service
          - real-vpn
          - real-vpn-extended
          - server-coverage
          - all
      platform_label:
        description: Self-hosted runner OS label for native package/server coverage suites
        required: true
        type: choice
        default: ubuntu-24.04
        options:
          - ubuntu-24.04
          - ubuntu-22.04
          - debian-12
          - debian-13
      arch_label:
        description: Self-hosted runner CPU architecture label for native package/server coverage suites
        required: true
        type: choice
        default: x64
        options:
          - x64
          - arm64
      lifecycle:
        description: Allow real-vpn to run daemon connect/disconnect lifecycle checks
        required: true
        type: boolean
        default: false
      tun:
        description: Allow real-vpn lifecycle to apply TUN-mode networking mutations
        required: true
        type: boolean
        default: false
      crash_tests:
        description: Allow real-vpn-extended/server-coverage suites to kill supervised core/daemon processes
        required: true
        type: boolean
        default: false
      host_disruption_tests:
        description: Allow server-coverage to run host-provided suspend/network/DHCP/DNS/polkit wrappers
        required: true
        type: boolean
        default: false
      stability_minutes:
        description: Long-running stability probe duration for extended real-vpn/server-coverage suites
        required: true
        type: string
        default: '0'

permissions:
  contents: read

concurrency:
  group: podlaz-e2e-${{ inputs.suite }}-${{ inputs.platform_label }}-${{ inputs.arch_label }}
  cancel-in-progress: false

jobs:
  cli-contract:
    name: CLI contract e2e
    if: ${{ inputs.suite == 'cli-contract' || inputs.suite == 'all' }}
    runs-on: [self-hosted, linux, x64, vpn-e2e, ubuntu-24.04]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: false

      - name: Run CLI contract e2e
        shell: bash
        run: |
          rm -rf "${RUNNER_TEMP}/podlaz-e2e-artifacts" "${RUNNER_TEMP}/podlaz-e2e-tmp"
          bash scripts/e2e/cli-contract.sh

      - name: Upload CLI contract diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: podlaz-cli-contract-e2e-diagnostics
          path: ${{ runner.temp }}/podlaz-e2e-artifacts
          if-no-files-found: ignore

  package-service:
    name: Package and service e2e
    if: ${{ inputs.suite == 'package-service' || inputs.suite == 'all' }}
    runs-on: [self-hosted, linux, '${{ inputs.arch_label }}', vpn-e2e, '${{ inputs.platform_label }}']
    timeout-minutes: 45
    env:
      PODLAZ_DEB_ARCH: ${{ inputs.arch_label == 'arm64' && 'arm64' || 'amd64' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: false

      - name: Run package/service e2e
        shell: bash
        run: |
          rm -rf "${RUNNER_TEMP}/podlaz-e2e-artifacts" "${RUNNER_TEMP}/podlaz-e2e-tmp"
          bash scripts/e2e/package-service.sh

      - name: Upload package/service diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: podlaz-package-service-e2e-diagnostics-${{ inputs.platform_label }}-${{ inputs.arch_label }}
          path: ${{ runner.temp }}/podlaz-e2e-artifacts
          if-no-files-found: ignore

  real-vpn:
    name: Real VPN e2e
    if: ${{ inputs.suite == 'real-vpn' || inputs.suite == 'all' }}
    runs-on: [self-hosted, linux, x64, vpn-e2e, ubuntu-24.04]
    environment: vpn-e2e
    timeout-minutes: 60
    env:
      PODLAZ_E2E_PROFILE_URI: ${{ secrets.PODLAZ_E2E_PROFILE_URI }}
      PODLAZ_E2E_SUBSCRIPTION_URL: ${{ secrets.PODLAZ_E2E_SUBSCRIPTION_URL }}
      PODLAZ_E2E_EXPECTED_EGRESS_IP: ${{ secrets.PODLAZ_E2E_EXPECTED_EGRESS_IP }}
      PODLAZ_E2E_PUBLIC_IP_CHECK_URL: ${{ vars.PODLAZ_E2E_PUBLIC_IP_CHECK_URL }}
      PODLAZ_E2E_DNS_CHECK_HOST: ${{ vars.PODLAZ_E2E_DNS_CHECK_HOST }}
      PODLAZ_E2E_ENABLE_LIFECYCLE: ${{ inputs.lifecycle }}
      PODLAZ_E2E_ENABLE_TUN: ${{ inputs.tun }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: false

      - name: Run real VPN e2e
        shell: bash
        run: |
          rm -rf "${RUNNER_TEMP}/podlaz-e2e-artifacts" "${RUNNER_TEMP}/podlaz-e2e-tmp"
          bash scripts/e2e/real-vpn.sh

      - name: Upload real VPN diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: podlaz-real-vpn-e2e-diagnostics
          path: ${{ runner.temp }}/podlaz-e2e-artifacts
          if-no-files-found: ignore

  real-vpn-extended:
    name: Extended real VPN e2e
    if: ${{ inputs.suite == 'real-vpn-extended' }}
    runs-on: [self-hosted, linux, x64, vpn-e2e, ubuntu-24.04]
    environment: vpn-e2e
    timeout-minutes: 240
    env:
      PODLAZ_E2E_PROFILE_URI: ${{ secrets.PODLAZ_E2E_PROFILE_URI }}
      PODLAZ_E2E_PROFILE_URI_2: ${{ secrets.PODLAZ_E2E_PROFILE_URI_2 }}
      PODLAZ_E2E_PROFILE_URI_3: ${{ secrets.PODLAZ_E2E_PROFILE_URI_3 }}
      PODLAZ_E2E_PROFILE_URI_4: ${{ secrets.PODLAZ_E2E_PROFILE_URI_4 }}
      PODLAZ_E2E_SUBSCRIPTION_URL: ${{ secrets.PODLAZ_E2E_SUBSCRIPTION_URL }}
      PODLAZ_E2E_EXPECTED_EGRESS_IP: ${{ secrets.PODLAZ_E2E_EXPECTED_EGRESS_IP }}
      PODLAZ_E2E_EXPECTED_EGRESS_IPV6: ${{ secrets.PODLAZ_E2E_EXPECTED_EGRESS_IPV6 }}
      PODLAZ_E2E_EXPECT_IPV6: ${{ vars.PODLAZ_E2E_EXPECT_IPV6 }}
      PODLAZ_E2E_PUBLIC_IP_CHECK_URL: ${{ vars.PODLAZ_E2E_PUBLIC_IP_CHECK_URL }}
      PODLAZ_E2E_PUBLIC_IPV6_CHECK_URL: ${{ vars.PODLAZ_E2E_PUBLIC_IPV6_CHECK_URL }}
      PODLAZ_E2E_DNS_CHECK_HOST: ${{ vars.PODLAZ_E2E_DNS_CHECK_HOST }}
      PODLAZ_E2E_ENABLE_TUN: ${{ inputs.tun }}
      PODLAZ_E2E_ENABLE_CRASH_TESTS: ${{ inputs.crash_tests }}
      PODLAZ_E2E_STABILITY_MINUTES: ${{ inputs.stability_minutes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: false

      - name: Run extended real VPN e2e
        shell: bash
        run: |
          rm -rf "${RUNNER_TEMP}/podlaz-e2e-artifacts" "${RUNNER_TEMP}/podlaz-e2e-tmp"
          bash scripts/e2e/real-vpn-extended.sh

      - name: Upload extended real VPN diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: podlaz-real-vpn-extended-e2e-diagnostics
          path: ${{ runner.temp }}/podlaz-e2e-artifacts
          if-no-files-found: ignore

  server-coverage:
    name: Maximum server coverage e2e
    if: ${{ inputs.suite == 'server-coverage' }}
    runs-on: [self-hosted, linux, '${{ inputs.arch_label }}', vpn-e2e, '${{ inputs.platform_label }}']
    environment: vpn-e2e
    timeout-minutes: 360
    env:
      PODLAZ_DEB_ARCH: ${{ inputs.arch_label == 'arm64' && 'arm64' || 'amd64' }}
      PODLAZ_E2E_PROFILE_URI: ${{ secrets.PODLAZ_E2E_PROFILE_URI }}
      PODLAZ_E2E_PROFILE_URI_2: ${{ secrets.PODLAZ_E2E_PROFILE_URI_2 }}
      PODLAZ_E2E_PROFILE_URI_3: ${{ secrets.PODLAZ_E2E_PROFILE_URI_3 }}
      PODLAZ_E2E_PROFILE_URI_4: ${{ secrets.PODLAZ_E2E_PROFILE_URI_4 }}
      PODLAZ_E2E_PROFILE_URI_LIST: ${{ secrets.PODLAZ_E2E_PROFILE_URI_LIST }}
      PODLAZ_E2E_SUBSCRIPTION_URL: ${{ secrets.PODLAZ_E2E_SUBSCRIPTION_URL }}
      PODLAZ_E2E_EXPECTED_EGRESS_IP: ${{ secrets.PODLAZ_E2E_EXPECTED_EGRESS_IP }}
      PODLAZ_E2E_EXPECTED_EGRESS_IPV6: ${{ secrets.PODLAZ_E2E_EXPECTED_EGRESS_IPV6 }}
      PODLAZ_E2E_EXPECT_IPV6: ${{ vars.PODLAZ_E2E_EXPECT_IPV6 }}
      PODLAZ_E2E_PUBLIC_IP_CHECK_URL: ${{ vars.PODLAZ_E2E_PUBLIC_IP_CHECK_URL }}
      PODLAZ_E2E_PUBLIC_IPV6_CHECK_URL: ${{ vars.PODLAZ_E2E_PUBLIC_IPV6_CHECK_URL }}
      PODLAZ_E2E_DNS_CHECK_HOST: ${{ vars.PODLAZ_E2E_DNS_CHECK_HOST }}
      PODLAZ_E2E_STATUS_CONCURRENCY: ${{ vars.PODLAZ_E2E_STATUS_CONCURRENCY }}
      PODLAZ_E2E_HOST_WRAPPER_DIR: ${{ vars.PODLAZ_E2E_HOST_WRAPPER_DIR }}
      PODLAZ_E2E_HOST_WRAPPER_TIMEOUT_SECONDS: ${{ vars.PODLAZ_E2E_HOST_WRAPPER_TIMEOUT_SECONDS }}
      PODLAZ_E2E_HOST_DISRUPTION_MODE: ${{ vars.PODLAZ_E2E_HOST_DISRUPTION_MODE }}
      PODLAZ_E2E_ENABLE_TUN: ${{ inputs.tun }}
      PODLAZ_E2E_ENABLE_CRASH_TESTS: ${{ inputs.crash_tests }}
      PODLAZ_E2E_ENABLE_HOST_DISRUPTION: ${{ inputs.host_disruption_tests }}
      PODLAZ_E2E_STABILITY_MINUTES: ${{ inputs.stability_minutes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: false

      - name: Run maximum server coverage e2e
        shell: bash
        run: |
          rm -rf "${RUNNER_TEMP}/podlaz-e2e-artifacts" "${RUNNER_TEMP}/podlaz-e2e-tmp"
          bash scripts/e2e/server-coverage.sh

      - name: Upload maximum server coverage diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: podlaz-server-coverage-e2e-diagnostics-${{ inputs.platform_label }}-${{ inputs.arch_label }}
          path: ${{ runner.temp }}/podlaz-e2e-artifacts
          if-no-files-found: ignore
