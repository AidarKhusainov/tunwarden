name: v0.2 acceptance smoke

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-backed-tun-smoke:
    name: Secret-backed TUN smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && contains(github.event.pull_request.labels.*.name, 'run-v0.2-acceptance'))
    timeout-minutes: 45
    env:
      TUNWARDEN_ACCEPTANCE_VLESS_URI: ${{ secrets.NLD_LINK }}
      TUNWARDEN_ACCEPTANCE_SUBSCRIPTION_URL: ${{ secrets.TEST_USER_SUBSCRIBER_LINK }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Install host dependencies
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            iproute2 \
            jq \
            libcap2-bin \
            nftables \
            policykit-1 \
            unzip

      - name: Install Xray and tun2socks
        run: |
          set -Eeuo pipefail
          mkdir -p "$RUNNER_TEMP/tunwarden-tools"
          curl -fsSL -o "$RUNNER_TEMP/xray.zip" \
            https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q "$RUNNER_TEMP/xray.zip" -d "$RUNNER_TEMP/tunwarden-tools/xray"
          test -x "$RUNNER_TEMP/tunwarden-tools/xray/xray"
          echo "$RUNNER_TEMP/tunwarden-tools/xray" >> "$GITHUB_PATH"

          GOBIN="$RUNNER_TEMP/tunwarden-tools/bin" go install github.com/xjasonlyu/tun2socks/v2@latest
          test -x "$RUNNER_TEMP/tunwarden-tools/bin/tun2socks"
          echo "$RUNNER_TEMP/tunwarden-tools/bin" >> "$GITHUB_PATH"

      - name: Run secret-backed acceptance smoke
        shell: bash
        run: |
          set -Eeuo pipefail

          mkdir -p "$RUNNER_TEMP/tunwarden-acceptance"
          raw_log="$RUNNER_TEMP/tunwarden-acceptance/raw.log"
          sanitized_log="$RUNNER_TEMP/tunwarden-acceptance/sanitized.log"
          : > "$raw_log"
          current_step="bootstrap"
          daemon_pid=""

          redact_log() {
            python3 - "$raw_log" "$sanitized_log" <<'PY'
          import os
          import sys

          raw, sanitized = sys.argv[1], sys.argv[2]
          secrets = [
              os.environ.get("TUNWARDEN_ACCEPTANCE_VLESS_URI", ""),
              os.environ.get("TUNWARDEN_ACCEPTANCE_SUBSCRIPTION_URL", ""),
          ]
          with open(raw, "r", encoding="utf-8", errors="replace") as src:
              text = src.read()
          for secret in secrets:
              if secret:
                  text = text.replace(secret, "[REDACTED_SECRET]")
          with open(sanitized, "w", encoding="utf-8") as dst:
              dst.write(text)
          PY
          }

          emit_sanitized_log() {
            set +e
            if [[ -f "$raw_log" ]]; then
              redact_log >/dev/null 2>&1 || true
            fi
            if [[ -s "$sanitized_log" ]]; then
              cat "$sanitized_log"
            fi
          }

          cleanup_daemon() {
            set +e
            if [[ -n "${daemon_pid:-}" ]]; then
              ./bin/tunwarden disconnect >/dev/null 2>&1 || true
              kill "$daemon_pid" >/dev/null 2>&1 || true
              wait "$daemon_pid" >/dev/null 2>&1 || true
            fi
            sudo rm -f /etc/polkit-1/rules.d/49-tunwarden-ci-resolved.rules >/dev/null 2>&1 || true
            sudo systemctl restart polkit >/dev/null 2>&1 || sudo systemctl restart polkit.service >/dev/null 2>&1 || true
            sudo rm -rf /run/tunwarden >/dev/null 2>&1 || true
          }

          dns_diagnostics() {
            local label="$1"
            {
              echo
              echo "== DNS diagnostics: $label =="
              resolvectl status --no-pager || true
              resolvectl status tunwarden0 --no-pager || true
              resolvectl query example.com || true
              getent ahostsv4 example.com || true
              ip -4 route get 1.1.1.1 || true
              ip -4 rule show || true
              ip -4 route show table 51820 || true
            } >> "$raw_log" 2>&1
          }

          final_snapshots() {
            local label="$1"
            {
              echo
              echo "== $label snapshots =="
              ip -d link show tunwarden0 || true
              ip route show table all || true
              ip rule show || true
              sudo nft -a list ruleset || true
              resolvectl status tunwarden0 --no-pager || true
              pgrep -a xray || true
              pgrep -a tun2socks || true
              sudo find "${TUNWARDEN_RUNTIME_DIR:-/run/tunwarden}" -maxdepth 4 -xdev -print -ls || true
            } >> "$raw_log" 2>&1
          }

          best_effort_failure_evidence() {
            set +e
            if [[ -x ./bin/tunwarden ]]; then
              {
                echo
                echo "== failure best-effort status before cleanup =="
                ./bin/tunwarden status || true
                echo
                echo "== failure best-effort doctor before cleanup =="
                ./bin/tunwarden doctor || true
              } >> "$raw_log" 2>&1
            fi
            dns_diagnostics "failure before cleanup"
            final_snapshots "failure before cleanup"
            if [[ -x ./bin/tunwarden ]]; then
              {
                echo
                echo "== failure best-effort disconnect =="
                ./bin/tunwarden disconnect || true
                echo
                echo "== failure best-effort status after disconnect =="
                ./bin/tunwarden status || true
                echo
                echo "== failure best-effort doctor after disconnect =="
                ./bin/tunwarden doctor || true
                echo
                echo "== failure best-effort recover after disconnect =="
                ./bin/tunwarden recover || true
              } >> "$raw_log" 2>&1
            fi
            dns_diagnostics "failure after cleanup"
            final_snapshots "failure after cleanup"
          }

          failure_handler() {
            local status=$?
            set +e
            echo "::error::secret-backed acceptance smoke failed during: ${current_step:-unknown}"
            {
              echo
              echo "== failure =="
              echo "step: ${current_step:-unknown}"
              echo "exit_code: $status"
            } >> "$raw_log"
            best_effort_failure_evidence
            emit_sanitized_log
            exit "$status"
          }

          trap failure_handler ERR
          trap cleanup_daemon EXIT

          if [[ -z "${TUNWARDEN_ACCEPTANCE_VLESS_URI:-}" ]]; then
            echo "::error::repository secret NLD_LINK is required for this smoke run"
            echo "missing repository secret: NLD_LINK" >> "$raw_log"
            emit_sanitized_log
            exit 1
          fi
          if [[ -z "${TUNWARDEN_ACCEPTANCE_SUBSCRIPTION_URL:-}" ]]; then
            echo "::error::repository secret TEST_USER_SUBSCRIBER_LINK is required for this smoke run"
            echo "missing repository secret: TEST_USER_SUBSCRIBER_LINK" >> "$raw_log"
            emit_sanitized_log
            exit 1
          fi

          echo "::add-mask::$TUNWARDEN_ACCEPTANCE_VLESS_URI"
          echo "::add-mask::$TUNWARDEN_ACCEPTANCE_SUBSCRIPTION_URL"

          export TUNWARDEN_XRAY_PATH="$RUNNER_TEMP/tunwarden-tools/xray/xray"
          export TUNWARDEN_TUN2SOCKS_PATH="$RUNNER_TEMP/tunwarden-tools/bin/tun2socks"
          export XDG_STATE_HOME="$RUNNER_TEMP/tunwarden-state"
          export TUNWARDEN_RUNTIME_DIR="/run/tunwarden"
          mkdir -p "$XDG_STATE_HOME"

          run_logged() {
            current_step="$1"
            shift
            {
              echo
              echo "== command: $current_step =="
            } >> "$raw_log"
            "$@" >> "$raw_log" 2>&1
            current_step=""
          }

          validate_ip_literal() {
            python3 - "$1" >> "$raw_log" 2>&1 <<'PY'
          import ipaddress
          import sys

          ipaddress.ip_address(sys.argv[1])
          PY
          }

          fetch_public_ip() {
            local label="$1"
            local selected=""
            local attempt=""
            local provider=""
            local name=""
            local url=""
            local value=""
            local providers=(
              "api.ipify.org|https://api.ipify.org"
              "checkip.amazonaws.com|https://checkip.amazonaws.com"
              "icanhazip.com|https://icanhazip.com"
              "ifconfig.me/ip|https://ifconfig.me/ip"
              "ifconfig.co/ip|https://ifconfig.co/ip"
            )

            echo >> "$raw_log"
            echo "== external public IP check: $label ==" >> "$raw_log"
            for attempt in 1 2 3; do
              echo "attempt $attempt" >> "$raw_log"
              for provider in "${providers[@]}"; do
                name="${provider%%|*}"
                url="${provider#*|}"
                value="$(curl -4 --connect-timeout 5 --max-time 15 --retry 1 --retry-delay 1 --fail --silent --show-error "$url" 2>>"$raw_log" | tr -d '[:space:]' || true)"
                if [[ -z "$value" ]]; then
                  echo "$name: unavailable" >> "$raw_log"
                  continue
                fi
                if validate_ip_literal "$value"; then
                  echo "$name: $value" >> "$raw_log"
                  selected="$value"
                  break 2
                fi
                echo "$name: invalid response: $value" >> "$raw_log"
              done
              sleep "$attempt"
            done
            if [[ -z "$selected" ]]; then
              echo "external public IP lookup failed for $label" >> "$raw_log"
              return 1
            fi

            echo "$selected"
          }

          {
            echo "== environment =="
            date -u +'%Y-%m-%dT%H:%M:%SZ'
            uname -a
            go version
            "$TUNWARDEN_XRAY_PATH" version | head -n 1 || true
            "$TUNWARDEN_TUN2SOCKS_PATH" -version || true
            echo "Acceptance runtime directory: $TUNWARDEN_RUNTIME_DIR"
            ls -l /dev/net/tun || true
            ip -V || true
            nft --version || true
            resolvectl --version || true
            systemctl is-system-running || true
          } >> "$raw_log" 2>&1

          if [[ ! -c /dev/net/tun ]]; then
            sudo mkdir -p /dev/net
            sudo mknod /dev/net/tun c 10 200 || true
            sudo chmod 0666 /dev/net/tun || true
          fi

          run_logged "gofmt-check" bash -c 'files="$(gofmt -l .)"; if [[ -n "$files" ]]; then echo "gofmt would change:"; echo "$files"; exit 1; fi'
          run_logged "go-test" go test ./...
          run_logged "build-cli" go build -o ./bin/tunwarden ./cmd/tunwarden
          run_logged "build-daemon" go build -o ./bin/tunwardend ./cmd/tunwardend
          run_logged "version" ./bin/tunwarden version

          run_logged "import-vless" ./bin/tunwarden import "$TUNWARDEN_ACCEPTANCE_VLESS_URI"
          run_logged "import-subscription" ./bin/tunwarden import "$TUNWARDEN_ACCEPTANCE_SUBSCRIPTION_URL"
          run_logged "profile-list-json" ./bin/tunwarden profile list --json

          current_step="select imported VLESS profile"
          profile_id="$(./bin/tunwarden profile list --json | jq -r '[.profiles[] | select(.source == "imported_uri" and .protocol == "vless" and .server != "0.0.0.0")][0].id // empty')"
          if [[ -z "$profile_id" ]]; then
            echo "::error::no usable imported_uri VLESS profile was available after secret-backed imports"
            echo "no usable imported_uri VLESS profile was available after secret-backed imports" >> "$raw_log"
            emit_sanitized_log
            exit 1
          fi
          echo "Selected profile ID: $profile_id" >> "$raw_log"
          current_step=""
          run_logged "selected-profile-show" ./bin/tunwarden profile show "$profile_id"

          run_logged "plan-tun" ./bin/tunwarden plan --mode tun "$profile_id"
          run_logged "plan-tun-json" ./bin/tunwarden plan --mode tun "$profile_id" --json
          run_logged "doctor-initial" ./bin/tunwarden doctor

          current_step="baseline external public IP check"
          baseline_public_ip="$(fetch_public_ip "before VPN")"
          echo "Baseline public IP before VPN: $baseline_public_ip" >> "$raw_log"
          current_step=""

          echo "== before snapshots ==" >> "$raw_log"
          ip -d link show >> "$raw_log" 2>&1 || true
          ip route show table all >> "$raw_log" 2>&1 || true
          ip rule show >> "$raw_log" 2>&1 || true
          sudo nft -a list ruleset >> "$raw_log" 2>&1 || true
          resolvectl status --no-pager >> "$raw_log" 2>&1 || true

          current_step="prepare daemon runtime directory"
          sudo rm -rf "$TUNWARDEN_RUNTIME_DIR"
          sudo install -d -m 0700 -o "$USER" -g "$(id -gn)" "$TUNWARDEN_RUNTIME_DIR"
          echo "Prepared daemon runtime directory: $(stat -c '%U:%G %a %n' "$TUNWARDEN_RUNTIME_DIR")" >> "$raw_log"
          current_step=""

          current_step="allow non-root runner to configure systemd-resolved"
          sudo install -d -m 0755 /etc/polkit-1/rules.d
          cat <<POLKIT | sudo tee /etc/polkit-1/rules.d/49-tunwarden-ci-resolved.rules >/dev/null
          polkit.addRule(function(action, subject) {
            if (subject.user == "$USER" && action.id.indexOf("org.freedesktop.resolve1.") == 0) {
              return polkit.Result.YES;
            }
          });
          POLKIT
          sudo chmod 0644 /etc/polkit-1/rules.d/49-tunwarden-ci-resolved.rules
          sudo systemctl restart polkit || sudo systemctl restart polkit.service || true
          echo "Installed temporary polkit rule for org.freedesktop.resolve1.* and user $USER" >> "$raw_log"
          current_step=""

          # This smoke intentionally tests the packaged-style runtime directory
          # contract: TUNWARDEN_RUNTIME_DIR=/run/tunwarden, prepared as a
          # non-root runner-owned directory, while the daemon itself still runs
          # as the non-root runner with ambient CAP_NET_ADMIN.
          current_step="start non-root daemon with CAP_NET_ADMIN"
          sudo capsh \
            --keep=1 \
            --user="$USER" \
            --caps="cap_net_admin+eip" \
            --addamb="cap_net_admin" \
            -- -c "cd '$PWD' && env XDG_STATE_HOME='$XDG_STATE_HOME' TUNWARDEN_RUNTIME_DIR='$TUNWARDEN_RUNTIME_DIR' TUNWARDEN_XRAY_PATH='$TUNWARDEN_XRAY_PATH' TUNWARDEN_TUN2SOCKS_PATH='$TUNWARDEN_TUN2SOCKS_PATH' ./bin/tunwardend" \
            >> "$raw_log" 2>&1 &
          daemon_pid=$!
          sleep 2
          if ! kill -0 "$daemon_pid" >/dev/null 2>&1; then
            echo "daemon exited before initial doctor check" >> "$raw_log"
            wait "$daemon_pid" >> "$raw_log" 2>&1 || true
            exit 1
          fi
          current_step=""

          run_logged "doctor-initial" ./bin/tunwarden doctor
          run_logged "connect-tun" ./bin/tunwarden connect --mode tun "$profile_id"
          run_logged "status-active" ./bin/tunwarden status
          run_logged "doctor-active" ./bin/tunwarden doctor

          echo "== active snapshots ==" >> "$raw_log"
          ip -d link show tunwarden0 >> "$raw_log" 2>&1
          ip route show table all >> "$raw_log" 2>&1
          ip rule show >> "$raw_log" 2>&1
          sudo nft -a list ruleset >> "$raw_log" 2>&1
          resolvectl status tunwarden0 --no-pager >> "$raw_log" 2>&1 || true
          pgrep -a xray >> "$raw_log" 2>&1 || true
          pgrep -a tun2socks >> "$raw_log" 2>&1 || true
          sudo find "$TUNWARDEN_RUNTIME_DIR" -maxdepth 4 -xdev -print -ls >> "$raw_log" 2>&1 || true

          dns_diagnostics "active before connectivity smoke"
          run_logged "dns-resolvectl-query" resolvectl query example.com
          run_logged "dns-getent-ahostsv4" getent ahostsv4 example.com
          resolved_example_ip="$(getent ahostsv4 example.com | awk 'NR == 1 {print $1}')"
          if [[ -z "$resolved_example_ip" ]]; then
            echo "::error::getent did not return an IPv4 address for example.com"
            echo "getent did not return an IPv4 address for example.com" >> "$raw_log"
            exit 1
          fi
          run_logged "direct-ip-connectivity-smoke" curl --max-time 15 --fail --silent --show-error --resolve "example.com:443:$resolved_example_ip" https://example.com/
          run_logged "connectivity-smoke" curl --max-time 15 --fail --silent --show-error https://example.com/

          current_step="active VPN external public IP check"
          active_public_ip="$(fetch_public_ip "active VPN")"
          echo "Active VPN public egress IP: $active_public_ip" >> "$raw_log"
          if [[ "$active_public_ip" == "$baseline_public_ip" ]]; then
            echo "::error::external public IP did not change after TUN connect"
            echo "external public IP did not change after TUN connect: $active_public_ip" >> "$raw_log"
            emit_sanitized_log
            exit 1
          fi
          echo "External public IP changed after TUN connect: $baseline_public_ip -> $active_public_ip" >> "$raw_log"
          current_step=""

          run_logged "disconnect" ./bin/tunwarden disconnect
          run_logged "status-final" ./bin/tunwarden status
          run_logged "doctor-final" ./bin/tunwarden doctor
          run_logged "recover-final" ./bin/tunwarden recover

          current_step="final external public IP check"
          final_public_ip="$(fetch_public_ip "after disconnect")"
          echo "Final public IP after disconnect: $final_public_ip" >> "$raw_log"
          if [[ "$final_public_ip" != "$baseline_public_ip" ]]; then
            echo "warning: final public IP after disconnect differs from the baseline" >> "$raw_log"
          fi
          current_step=""

          final_snapshots "final"

          emit_sanitized_log

      - name: Upload sanitized acceptance smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v02-acceptance-smoke-log
          path: ${{ runner.temp }}/tunwarden-acceptance/sanitized.log
          if-no-files-found: error
