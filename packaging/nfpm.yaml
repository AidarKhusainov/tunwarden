name: tunwarden
arch: __ARCH__
platform: linux
version: __VERSION__
version_schema: none
section: net
priority: optional
maintainer: Aidar Khusainov <19706697+AidarKhusainov@users.noreply.github.com>
vendor: AidarKhusainov
homepage: https://github.com/AidarKhusainov/tunwarden
license: MIT
description: |-
  Linux-first CLI and daemon foundation for Xray-compatible VPN/proxy profiles.
  TunWarden makes VPN and proxy lifecycle behavior explicit, inspectable, and
  recoverable. The initial Debian package installs the CLI, daemon, systemd
  unit, sysusers configuration, shell completions, manual pages, AppStream
  metadata, and project documentation without enabling or starting the daemon
  automatically.

depends:
  - libc6 (>= 2.34)
  - systemd
  - ca-certificates

scripts:
  postinstall: ./packaging/debian/postinstall
  preremove: ./packaging/debian/preremove
  postremove: ./packaging/debian/postremove

contents:
  - src: ./dist/package-root/usr/bin/tunwarden
    dst: /usr/bin/tunwarden
    file_info:
      mode: 0755
  - src: ./dist/package-root/usr/bin/tunwardend
    dst: /usr/bin/tunwardend
    file_info:
      mode: 0755
  - src: ./dist/package-root/usr/lib/systemd/system/tunwardend.service
    dst: /usr/lib/systemd/system/tunwardend.service
    file_info:
      mode: 0644
  - src: ./dist/package-root/usr/lib/sysusers.d/tunwarden.conf
    dst: /usr/lib/sysusers.d/tunwarden.conf
    file_info:
      mode: 0644
  - src: ./dist/package-root/usr/share
    dst: /usr/share
    type: tree
