name: podlaz
arch: __ARCH__
platform: linux
version: __VERSION__
version_schema: none
section: net
priority: optional
maintainer: Aidar Khusainov <19706697+AidarKhusainov@users.noreply.github.com>
vendor: AidarKhusainov
homepage: https://github.com/AidarKhusainov/podlaz
license: MIT
description: |-
  Linux VPN client for Xray-compatible profiles.
  podlaz makes VPN and proxy profile lifecycle behavior explicit,
  inspectable, and recoverable through a CLI and a privileged daemon.

depends:
  - libc6 (>= 2.34)
  - systemd
  - ca-certificates

scripts:
  preinstall: ./packaging/debian/preinstall.sh
  postinstall: ./packaging/debian/postinstall
  preremove: ./packaging/debian/preremove
  postremove: ./packaging/debian/postremove

contents:
  - src: ./dist/package-root/usr/bin/podlaz
    dst: /usr/bin/podlaz
    file_info:
      mode: 0755
  - src: /usr/bin/podlaz
    dst: /usr/bin/plz
    type: symlink
  - src: ./dist/package-root/usr/bin/podlazd
    dst: /usr/bin/podlazd
    file_info:
      mode: 0755
  - src: ./dist/package-root/usr/lib/systemd/system/podlazd.service
    dst: /usr/lib/systemd/system/podlazd.service
    file_info:
      mode: 0644
  - src: ./dist/package-root/usr/lib/sysusers.d/podlaz.conf
    dst: /usr/lib/sysusers.d/podlaz.conf
    file_info:
      mode: 0644
  - src: ./dist/package-root/usr/share
    dst: /usr/share
    type: tree
