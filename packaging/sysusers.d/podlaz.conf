# Create the unprivileged identities used by packaged podlazd.
#
# podlaz owns the daemon service and daemon socket access group.
# podlaz-xray is the dedicated proxy-only Xray child identity used when a
# privileged daemon must drop process privileges before starting the core.
u podlaz - "podlaz daemon" /var/lib/podlaz -
u podlaz-xray - "podlaz proxy-only Xray child" /var/lib/podlaz -
