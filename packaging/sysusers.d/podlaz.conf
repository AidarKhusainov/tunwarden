# Create the unprivileged identities used by packaged podlazd.
#
# podlaz owns the daemon socket access group.
# podlaz-xray is the dedicated unprivileged child identity for Xray and
# the TUN adapter when the privileged daemon starts connection helpers.
u podlaz - "podlaz daemon" /var/lib/podlaz -
u podlaz-xray - "podlaz connection helper" /var/lib/podlaz -
