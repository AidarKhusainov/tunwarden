# Create the unprivileged identities used by packaged tunwardend.
#
# tunwarden owns the daemon service and daemon socket access group.
# tunwarden-xray is the dedicated proxy-only Xray child identity used when a
# privileged daemon must drop process privileges before starting the core.
u tunwarden - "TunWarden daemon" /var/lib/tunwarden -
u tunwarden-xray - "TunWarden proxy-only Xray child" /var/lib/tunwarden -
